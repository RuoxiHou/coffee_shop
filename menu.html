<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Shop Menu</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f8f5f2;
        margin: 2rem;
      }

      h1 {
        text-align: center;
      }

      table {
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 0.75rem;
        border-bottom: 1px solid #ccc;
        text-align: left;
      }

      th:last-child,
      td:last-child {
        text-align: right;
      }
    </style>
  </head>
  <body>
    <h1>Coffee Shop Menu</h1>

    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Espresso</td>
          <td>$2.50</td>
        </tr>
        <tr>
          <td>Cappuccino</td>
          <td>$3.75</td>
        </tr>
        <tr>
          <td>Blueberry Muffin</td>
          <td>$2.95</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
